<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoteMate AI — Your AI-Powered Voting Companion</title>
  <meta name="description" content="VoteMate AI helps Indian voters understand and complete the voting process with AI-powered guidance, document validation, and voter awareness quizzes." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗳️</text></svg>" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- 3D Tubes Background Canvas -->
  <canvas id="tubes-canvas"></canvas>

  <!-- ============ LANDING PAGE ============ -->
  <section id="landing" class="view active">
    <div class="landing-content">
      <!-- Language Toggle (top-right) -->
      <button class="lang-toggle" id="lang-toggle-landing" aria-label="Switch Language">
        <span class="lang-icon">🌐</span>
        <span class="lang-text" id="lang-text-landing">हिंदी</span>
      </button>

      <div class="landing-badge">
        <span class="dot"></span>
        <span id="landing-badge-text">AI-Powered Voting Assistant</span>
      </div>

      <h1 class="landing-title">
        <span class="text-cyan">VoteMate</span><br />
        <span class="text-magenta">AI</span>
      </h1>

      <p class="landing-subtitle" id="landing-subtitle">
        Your intelligent companion for navigating India's voting process — from registration to casting your vote.
      </p>

      <button class="landing-cta" id="cta-btn">
        <span id="cta-text">Get Started</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>

      <!-- Countdown Timer -->
      <div class="countdown-container" id="countdown-container"></div>


    </div>


  </section>

  <!-- ============ MAIN APP ============ -->
  <section id="main" class="view">

    <!-- Top Navigation -->
    <nav class="top-nav">
      <div style="display:flex; align-items:center; gap:16px;">
        <button class="nav-back" id="nav-back-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          <span id="nav-home-text">Home</span>
        </button>
        <div class="nav-brand">
          <div class="brand-icon">🗳️</div>
          <span>VoteMate AI</span>
        </div>
      </div>

      <div class="nav-tabs">
        <button class="nav-tab active" data-tab="chat">
          <span class="tab-icon">💬</span> <span class="tab-label" data-key="chat">Chat</span>
        </button>
        <button class="nav-tab" data-tab="documents">
          <span class="tab-icon">📋</span> <span class="tab-label" data-key="documents">Documents</span>
        </button>
        <button class="nav-tab" data-tab="quiz">
          <span class="tab-icon">🧠</span> <span class="tab-label" data-key="quiz">Quiz</span>
        </button>
      </div>

      <div class="nav-actions">
        <button class="lang-toggle lang-toggle-sm" id="lang-toggle-main" aria-label="Switch Language">
          <span class="lang-icon">🌐</span>
          <span class="lang-text" id="lang-text-main">हिंदी</span>
        </button>
      </div>
    </nav>

    <!-- Sidebar: Checklist + Readiness -->
    <aside class="sidebar">
      <div class="sidebar-title" id="sidebar-title">Voting Checklist</div>
      <div class="checklist"></div>

      <!-- Readiness Dashboard -->
      <div class="readiness-card" id="readiness-card">
        <div class="readiness-ring-container">
          <svg class="readiness-ring" viewBox="0 0 120 120">
            <circle class="readiness-ring-bg" cx="60" cy="60" r="52" />
            <circle class="readiness-ring-fill" cx="60" cy="60" r="52" id="readiness-ring-fill" />
          </svg>
          <div class="readiness-pct" id="readiness-pct">0%</div>
        </div>
        <div class="readiness-label" id="readiness-label">Complete your checklist</div>
      </div>

      <div class="sidebar-progress">
        <div class="progress-label">
          <span id="progress-text">Progress</span>
          <span class="progress-pct">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main>
      <!-- Chat Tab -->
      <div class="tab-content active" id="tab-chat">
        <div class="chat-panel">
          <div class="chat-messages" id="chat-messages"></div>
          <div class="chat-chips" id="chat-chips"></div>
          <div class="chat-input-area">
            <div class="chat-input-wrapper">
              <input type="text" class="chat-input" id="chat-input" placeholder="Ask about voting..." autocomplete="off" />
              <button class="voice-btn" id="voice-btn" aria-label="Voice Input" title="Voice Input">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                <span class="voice-pulse"></span>
              </button>
              <button class="chat-send-btn" id="chat-send" aria-label="Send message">
                <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Documents Tab -->
      <div class="tab-content" id="tab-documents">
        <div class="doc-panel"></div>
      </div>

      <!-- Quiz Tab -->
      <div class="tab-content" id="tab-quiz">
        <div class="quiz-panel"></div>
      </div>
    </main>
  </section>

  <!-- Mobile Bottom Tabs -->
  <div class="mobile-tabs">
    <button class="mobile-tab active" data-tab="chat">
      <span class="tab-icon">💬</span>
      <span class="mob-tab-text" data-key="chat">Chat</span>
    </button>
    <button class="mobile-tab" data-tab="documents">
      <span class="tab-icon">📋</span>
      <span class="mob-tab-text" data-key="docs">Docs</span>
    </button>
    <button class="mobile-tab" data-tab="quiz">
      <span class="tab-icon">🧠</span>
      <span class="mob-tab-text" data-key="quiz">Quiz</span>
    </button>
  </div>

  <!-- Scripts (order: dependencies → features → controller) -->
  <script src="js/lang.js"></script>
  <script src="js/confetti.js"></script>
  <script src="js/countdown.js"></script>
  <script src="js/voice.js"></script>
  <script src="js/tubes.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/checklist.js"></script>
  <script src="js/documents.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
