<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoteMate AI — Test Suite</title>
  <meta name="description" content="Automated test suite for VoteMate AI voting assistant" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a1a;
      color: #e0e0e0;
      padding: 32px;
      min-height: 100vh;
    }
    h1 { font-size: 1.8rem; color: #00f0ff; margin-bottom: 8px; }
    .subtitle { color: rgba(255,255,255,0.5); margin-bottom: 32px; font-size: 0.9rem; }
    .test-summary {
      display: flex; align-items: center; gap: 32px;
      padding: 24px; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; margin-bottom: 24px;
    }
    .test-score {
      font-size: 3rem; font-weight: 900;
      min-width: 120px; text-align: center;
    }
    .test-score.perfect { color: #53bc28; }
    .test-score.good { color: #00f0ff; }
    .test-score.bad { color: #ff4757; }
    .test-counts { display: flex; gap: 20px; font-size: 1.1rem; }
    .pass-count { color: #53bc28; }
    .fail-count { color: #ff4757; }
    .total-count { color: rgba(255,255,255,0.5); }
    .test-list { display: flex; flex-direction: column; gap: 4px; }
    .test-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px; border-radius: 8px; font-size: 0.88rem;
    }
    .test-item.pass { background: rgba(83,188,40,0.08); }
    .test-item.fail { background: rgba(255,71,87,0.12); color: #ff6b7a; }
    .test-status { font-size: 0.85rem; }
    .loading { color: rgba(255,255,255,0.4); font-style: italic; padding: 40px; }
  </style>
</head>
<body>
  <h1>🧪 VoteMate AI — Test Suite</h1>
  <p class="subtitle">Automated unit & integration tests for all modules</p>

  <div id="test-results">
    <div class="loading">Running tests...</div>
  </div>

  <!-- Hidden elements needed by accessibility tests -->
  <nav style="display:none"><a href="#">nav</a></nav>
  <main style="display:none"></main>
  <aside style="display:none"></aside>
  <button aria-label="test" style="display:none"></button>
  <input placeholder="test input" style="display:none" />

  <!-- Load all app modules (same order as index.html) -->
  <script src="../js/lang.js"></script>
  <script src="../js/confetti.js"></script>
  <script src="../js/countdown.js"></script>
  <script src="../js/voice.js"></script>
  <script src="../js/tubes.js"></script>
  <script src="../js/chat.js"></script>
  <script src="../js/checklist.js"></script>
  <script src="../js/documents.js"></script>
  <script src="../js/quiz.js"></script>
  <script src="../js/gemini.js"></script>
  <script src="../js/firebase-config.js"></script>

  <!-- Load and run tests -->
  <script src="tests.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Small delay to ensure all modules are loaded
      setTimeout(() => TestRunner.runAll(), 100);
    });
  </script>
</body>
</html>
